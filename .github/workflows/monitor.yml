name: P-Bandai One Piece monitor

on:
  schedule:
    # Every 5 minutes. NOTE: GitHub's cron is best-effort and often runs late
    # under load; treat this as "~every 5-15 min", not a hard guarantee.
    - cron: "*/5 * * * *"
  workflow_dispatch:
    # Lets you trigger a run manually from the Actions tab (used for first seed).
    inputs:
      seed_only:
        description: "Seed state without sending notifications (use on first run)"
        required: false
        default: "false"
      test_ping:
        description: "Send a single test notification and exit (verify ntfy works)"
        required: false
        default: "false"

# Prevent overlapping runs from racing on the committed state file.
concurrency:
  group: pbandai-monitor
  cancel-in-progress: false

permissions:
  contents: write   # needed to commit the updated seen.json back to the repo

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          # NTFY_SERVER intentionally omitted — the script defaults to https://ntfy.sh.
          # Only set it (and create the secret) if you self-host ntfy.
          SEED_ONLY: ${{ github.event.inputs.seed_only == 'true' && '1' || '0' }}
          TEST_PING: ${{ github.event.inputs.test_ping == 'true' && '1' || '0' }}
        run: python monitor.py

      - name: Commit updated state
        if: always()   # persist state even if a later step failed
        run: |
          git config user.name "pbandai-monitor"
          git config user.email "actions@github.com"
          if ! git diff --quiet seen.json 2>/dev/null; then
            git add seen.json
            git commit -m "Update seen items [skip ci]"
            git push
          else
            echo "No state change to commit."
          fi
